[Settings]
# Number of archived logs folder
LogRotateCount=10

# use User's AppData directory for logs and configs
# usually C:\Users\<USERNAME>\AppData\Local\PixetPro (Windows)
UseAppDataDir=true

# overrides this ini file with user custom one
PixetIniInAppDataDir=false

LogToStdout=true
CApiLog=true

# Use of a virtual device when no device connected
CreateFileDeviceWhenNoDevs=false

